
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Prime Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#0b1120] text-white font-sans">
    <header class="bg-white py-4 shadow-lg">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <img src="logo.png" alt="Logo" class="h-16 w-auto">
            <a href="tel:+10000000000" class="bg-[#C5A059] text-white px-6 py-2 rounded-full font-bold uppercase text-sm tracking-widest">Call Now</a>
        </div>
    </header>

    <section class="container mx-auto px-6 py-20 grid md:grid-cols-2 items-center gap-10">
        <div>
            <h1 class="text-6xl font-black mb-6 leading-none tracking-tighter uppercase">Premium <span class="text-[#C5A059]">Appliance</span> Repair</h1>
            <p class="text-xl text-slate-400 mb-10 font-light italic">Serving South Bay, CA. Quality you can trust.</p>
            <a href="tel:+10000000000" class="bg-[#C5A059] text-white px-10 py-5 rounded-xl font-black text-xl uppercase shadow-2xl">Book Now</a>
        </div>
        <div class="relative">
            <img src="hero-person.png" alt="Expert" class="w-full h-auto drop-shadow-[0_0_50px_rgba(197,160,89,0.3)]">
        </div>
    </section>

    <section class="bg-white text-slate-900 py-20">
        <div class="container mx-auto px-6 grid md:grid-cols-3 gap-8">
            <div class="border-t-4 border-[#C5A059] pt-6">
                <h3 class="text-2xl font-black uppercase mb-4">Washers & Dryers</h3>
                <img src="https://images.unsplash.com/photo-1626806819282-2c1dc61a0e05?q=80&w=800" class="w-full h-48 object-cover mb-4 rounded-lg">
            </div>
            <div class="border-t-4 border-[#C5A059] pt-6">
                <h3 class="text-2xl font-black uppercase mb-4">Ovens & Ranges</h3>
                <img src="https://images.unsplash.com/photo-1556910103-1c02745aae4d?q=80&w=800" class="w-full h-48 object-cover mb-4 rounded-lg">
            </div>
            <div class="border-t-4 border-[#C5A059] pt-6">
                <h3 class="text-2xl font-black uppercase mb-4">Dishwashers</h3>
                <img src="https://images.unsplash.com/photo-1584622650111-993a426fbf0a?q=80&w=800" class="w-full h-48 object-cover mb-4 rounded-lg">
            </div>
        </div>
    </section>

    <footer class="py-10 text-center border-t border-slate-800">
        <img src="logo.png" class="h-12 mx-auto mb-6 opacity-50">
        <div class="text-sm tracking-widest text-slate-500 mb-2 uppercase">Serving South Bay, California</div>
        <div class="text-[#C5A059] font-bold text-xl mb-6 underline leading-none">
            <a href="tel:+10000000000">Click to Call: [Your Number]</a>
        </div>
        <p class="text-[10px] text-slate-700">© 2026 FOCUS PRIME SOLUTIONS. ALL RIGHTS RESERVED.</p>
    </footer>
</body>
</html>
